<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ガソリン最安" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>近くのGS価格メモ</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f5f7fb; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    header { padding: 22px 16px; background: linear-gradient(135deg, #020617, #1d4ed8); color: #fff; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 18px rgba(2,6,23,.25); }
    main { width: min(980px, 100%); margin: 0 auto; padding: 14px; padding-bottom: 98px; }
    h1 { margin: 0 0 6px; font-size: 24px; }
    h2 { margin: 0 0 12px; font-size: 19px; }
    .heroSub { opacity: .9; font-size: 14px; line-height: 1.6; }
    .card { background: #fff; border-radius: 20px; padding: 16px; margin: 12px 0; box-shadow: 0 8px 26px rgba(15,23,42,.08); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .row > * { flex: 1; min-width: 150px; }
    button, input, select { width: 100%; font-size: 16px; border-radius: 14px; border: 1px solid #d6dbe8; padding: 12px 14px; background: #fff; }
    button { border: 0; background: #2563eb; color: white; cursor: pointer; font-weight: 800; }
    button.secondary { background: #475569; }
    button.green { background: #16a34a; }
    button.danger { background: #dc2626; }
    button:disabled { opacity: .55; cursor: wait; }
    .status { color: #4b5563; line-height: 1.7; font-size: 14px; margin-bottom: 0; }
    .result { display: grid; gap: 10px; }
    .station { border: 1px solid #e5e7eb; border-radius: 18px; padding: 14px; background: #fff; }
    .best { border: 2px solid #ef4444; background: linear-gradient(180deg, #fff7ed, #fff); }
    .station-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .name { font-size: 18px; font-weight: 900; }
    .price { font-size: 30px; font-weight: 950; color: #dc2626; white-space: nowrap; }
    .small { color: #64748b; font-size: 13px; line-height: 1.65; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; font-weight: 800; margin-top: 6px; margin-right: 4px; }
    .badge.red { background: #fee2e2; color: #991b1b; }
    .badge.green { background: #dcfce7; color: #166534; }
    .priceGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .priceGrid label { display: grid; gap: 4px; color: #64748b; font-size: 12px; font-weight: 800; }
    .priceGrid input { text-align: center; font-size: 18px; font-weight: 900; padding: 10px; }
    a { color: #2563eb; font-weight: 800; }
    .bottomBar { position: fixed; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,.92); backdrop-filter: blur(10px); border-top: 1px solid #e5e7eb; padding: 10px 14px max(10px, env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 20; }
    @media (max-width: 520px) { h1 { font-size: 22px; } .station-head { display: block; } .price { margin-top: 8px; } .priceGrid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <h1>近くのGS価格メモ</h1>
  <div class="heroSub">近くのGS一覧を自動作成 → 価格を入力 → 最安順で保存表示。PWA対応。</div>
</header>

<main>
  <section class="card">
    <h2>近くのGS一覧作成</h2>
    <div class="row">
      <button id="searchBtn">現在地からGS一覧作成</button>
      <button class="green" id="installBtn" hidden>アプリとして追加</button>
    </div>
    <p class="status" id="status">現在地を許可すると、OpenStreetMapのデータから近くのガソリンスタンド一覧を作成します。</p>
  </section>

  <section class="card">
    <h2>表示設定</h2>
    <div class="row">
      <select id="fuelType">
        <option value="regular">レギュラーで最安順</option>
        <option value="highOctane">ハイオクで最安順</option>
        <option value="diesel">軽油で最安順</option>
      </select>
      <input id="radius" type="number" min="1" max="20" value="5" inputmode="numeric" placeholder="半径km" />
      <button class="secondary" id="addBtn">手動でGS追加</button>
    </div>
    <p class="status">最終更新: <span id="lastUpdated">なし</span></p>
  </section>

  <section class="card">
    <h2>GS一覧・価格入力</h2>
    <div id="results" class="result"><div class="small">まだGS一覧を作成していません。</div></div>
  </section>
</main>

<div class="bottomBar">
  <button id="saveBtn">価格を保存/並替</button>
  <button class="secondary" id="nearMapBtn">地図で開く</button>
</div>

<script>
const APP_VERSION = "2026.05.05-gs-list-price-memo";
const statusEl = document.getElementById("status");
const resultsEl = document.getElementById("results");
const lastUpdatedEl = document.getElementById("lastUpdated");
const searchBtn = document.getElementById("searchBtn");
const saveBtn = document.getElementById("saveBtn");
const addBtn = document.getElementById("addBtn");
const nearMapBtn = document.getElementById("nearMapBtn");
const fuelTypeEl = document.getElementById("fuelType");
const radiusEl = document.getElementById("radius");
const installBtn = document.getElementById("installBtn");
let stations = JSON.parse(localStorage.getItem("stations") || "[]");
let lastPosition = JSON.parse(localStorage.getItem("lastPosition") || "null");
let deferredInstallPrompt = null;

fuelTypeEl.value = localStorage.getItem("fuelType") || "regular";
radiusEl.value = localStorage.getItem("radiusKm") || "5";
lastUpdatedEl.textContent = localStorage.getItem("lastUpdated") || "なし";
renderStations();

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferredInstallPrompt = e; installBtn.hidden = false; });
installBtn.addEventListener("click", async () => { if (!deferredInstallPrompt) return; deferredInstallPrompt.prompt(); await deferredInstallPrompt.userChoice; installBtn.hidden = true; deferredInstallPrompt = null; });

searchBtn.addEventListener("click", getLocationAndBuildList);
saveBtn.addEventListener("click", savePricesAndSort);
addBtn.addEventListener("click", addManualStation);
nearMapBtn.addEventListener("click", () => {
  if (lastPosition) openMapSearch(`${lastPosition.lat},${lastPosition.lon} ガソリンスタンド`);
  else openMapSearch("近くのガソリンスタンド");
});
fuelTypeEl.addEventListener("change", () => { localStorage.setItem("fuelType", fuelTypeEl.value); savePricesAndSort(false); });
radiusEl.addEventListener("change", () => localStorage.setItem("radiusKm", radiusEl.value || "5"));

function getLocationAndBuildList() {
  if (!navigator.geolocation) { statusEl.textContent = "このブラウザでは現在地取得が使えません。"; return; }
  setBusy(true, "現在地を取得しています。位置情報を許可してください。");
  navigator.geolocation.getCurrentPosition(async pos => {
    lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    localStorage.setItem("lastPosition", JSON.stringify(lastPosition));
    await buildNearbyStationList(lastPosition.lat, lastPosition.lon);
    setBusy(false);
  }, () => setBusy(false, "現在地取得が許可されませんでした。手動追加を使ってください。"), { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 });
}

async function buildNearbyStationList(lat, lon) {
  const radiusMeter = Math.max(1, Math.min(20, Number(radiusEl.value || 5))) * 1000;
  statusEl.textContent = `半径${radiusMeter / 1000}kmのGS一覧を作成中です。`;
  const query = `[out:json][timeout:25];(node["amenity"="fuel"](around:${radiusMeter},${lat},${lon});way["amenity"="fuel"](around:${radiusMeter},${lat},${lon});relation["amenity"="fuel"](around:${radiusMeter},${lat},${lon}););out center tags;`;
  const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
  if (!res.ok) throw new Error("Overpass API error");
  const data = await res.json();
  const oldMap = new Map(stations.map(s => [s.id, s]));
  const list = (data.elements || []).map(e => {
    const pLat = e.lat ?? e.center?.lat;
    const pLon = e.lon ?? e.center?.lon;
    const id = `${e.type}-${e.id}`;
    const old = oldMap.get(id) || {};
    return {
      id,
      name: e.tags?.name || e.tags?.brand || "名称未登録GS",
      brand: e.tags?.brand || e.tags?.operator || "GS",
      address: buildAddress(e.tags),
      lat: pLat,
      lon: pLon,
      distance: calcDistanceKm(lat, lon, pLat, pLon),
      regular: old.regular || "",
      highOctane: old.highOctane || "",
      diesel: old.diesel || "",
      memo: old.memo || ""
    };
  }).filter(s => Number.isFinite(s.distance));

  stations = mergeManualStations(list, stations).sort((a,b) => a.distance - b.distance);
  persistStations();
  renderStations();
  statusEl.textContent = `${stations.length}件のGS一覧を作成しました。価格を入力して「価格を保存/並替」を押してください。`;
}

function mergeManualStations(apiList, oldList) {
  const ids = new Set(apiList.map(s => s.id));
  const manual = oldList.filter(s => String(s.id).startsWith("manual-") && !ids.has(s.id));
  return [...apiList, ...manual];
}

function addManualStation() {
  const name = prompt("GS名を入力してください");
  if (!name) return;
  stations.push({ id: "manual-" + Date.now(), name, brand: "手動追加", address: "", lat: null, lon: null, distance: 9999, regular: "", highOctane: "", diesel: "", memo: "" });
  persistStations();
  renderStations();
}

function renderStations() {
  if (!stations.length) { resultsEl.innerHTML = '<div class="small">まだGS一覧を作成していません。</div>'; return; }
  const fuel = fuelTypeEl.value;
  const sorted = [...stations].sort((a,b) => priceSortValue(a[fuel]) - priceSortValue(b[fuel]) || Number(a.distance ?? 9999) - Number(b.distance ?? 9999));
  resultsEl.innerHTML = "";
  sorted.forEach((s, index) => addStationCard(s, index, fuel));
}

function addStationCard(s, index, fuel) {
  const hasPrice = s[fuel] !== "" && s[fuel] != null;
  const div = document.createElement("div");
  div.className = "station" + (hasPrice && index === 0 ? " best" : "");
  div.dataset.id = s.id;
  const mapUrl = s.lat && s.lon ? `https://www.google.com/maps/search/${encodeURIComponent(s.lat + "," + s.lon)}` : `https://www.google.com/maps/search/${encodeURIComponent(s.name + " ガソリンスタンド")}`;
  div.innerHTML = `
    <div class="station-head">
      <div>
        <div class="name">${hasPrice && index === 0 ? "🏆 " : ""}${escapeHtml(s.name)}</div>
        <div class="small">${escapeHtml(s.address || "住所情報なし")} ${s.distance && s.distance < 9999 ? " / 約" + s.distance.toFixed(2) + "km" : ""}</div>
        <span class="badge ${hasPrice && index === 0 ? "red" : ""}">${hasPrice ? (index + 1) + "位" : "価格未入力"}</span>
        <span class="badge green">${escapeHtml(s.brand || "GS")}</span>
      </div>
      <div class="price">${hasPrice ? escapeHtml(s[fuel]) : "--"} 円/L</div>
    </div>
    <div class="priceGrid">
      <label>レギュラー<input data-field="regular" type="number" inputmode="numeric" value="${escapeHtml(s.regular || "")}" placeholder="例 165"></label>
      <label>ハイオク<input data-field="highOctane" type="number" inputmode="numeric" value="${escapeHtml(s.highOctane || "")}" placeholder="例 176"></label>
      <label>軽油<input data-field="diesel" type="number" inputmode="numeric" value="${escapeHtml(s.diesel || "")}" placeholder="例 145"></label>
    </div>
    <p><a href="${mapUrl}" target="_blank" rel="noopener">地図で開く</a></p>`;
  resultsEl.appendChild(div);
}

function savePricesAndSort(showMessage = true) {
  document.querySelectorAll(".station").forEach(card => {
    const id = card.dataset.id;
    const s = stations.find(x => x.id === id);
    if (!s) return;
    card.querySelectorAll("input[data-field]").forEach(input => { s[input.dataset.field] = input.value.trim(); });
  });
  persistStations();
  renderStations();
  if (showMessage) statusEl.textContent = "価格を保存し、選択中の油種で最安順に並べ替えました。";
}

function persistStations() {
  localStorage.setItem("stations", JSON.stringify(stations));
  const now = new Date().toLocaleString("ja-JP");
  localStorage.setItem("lastUpdated", now);
  lastUpdatedEl.textContent = now;
}

function buildAddress(tags = {}) {
  return [tags["addr:province"], tags["addr:city"], tags["addr:suburb"], tags["addr:neighbourhood"], tags["addr:street"], tags["addr:housenumber"]].filter(Boolean).join("") || tags["addr:full"] || "";
}

function priceSortValue(v) {
  const n = Number(v);
  return Number.isFinite(n) && n > 0 ? n : 99999;
}

function calcDistanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function toRad(v) { return v * Math.PI / 180; }
function setBusy(isBusy, message) { searchBtn.disabled = isBusy; saveBtn.disabled = isBusy; if (message) statusEl.textContent = message; }
function openMapSearch(query) { window.open(`https://www.google.com/maps/search/${encodeURIComponent(query)}`, "_blank"); }
function escapeHtml(value) { return String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
</script>
</body>
</html>
